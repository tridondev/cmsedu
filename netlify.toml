[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback so /educms/gaskiya/admin etc. all resolve to index.html
# and React Router takes over client-side. /.netlify/functions/* is a
# reserved path Netlify handles before redirects, so this doesn't shadow it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
